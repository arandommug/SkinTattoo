name: Test Release

on:
  push:
    tags:
      - 'testing_v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncherCN\addon\Hooks\dev"
      - name: Build
        run: |
          $ver = '${{ github.ref_name }}' -replace '^testing_v'
          invoke-expression 'dotnet build --no-restore --configuration Debug --nologo -p:SkinTattooVersion=$ver -p:Version=$ver -p:FileVersion=$ver -p:AssemblyVersion=$ver'
      - name: Archive
        run: Compress-Archive -Path SkinTattoo/SkinTattoo/bin/Debug/win-x64/* -DestinationPath SkinTattoo.zip
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkinTattoo
          path: SkinTattoo/SkinTattoo/bin/Debug/win-x64/*
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: SkinTattoo ${{ github.ref_name }}
          draft: false
          prerelease: true
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./SkinTattoo.zip
          asset_name: SkinTattoo.zip
          asset_content_type: application/zip

      - name: Update repo.json
        run: |
          $ver = '${{ github.ref_name }}' -replace '^testing_v'
          $tag = '${{ github.ref_name }}'
          $path = './repo.json'
          $json = Get-Content -Raw $path | ConvertFrom-Json
          $json[0].TestingAssemblyVersion = $ver
          $json[0].DownloadLinkTesting = $json[0].DownloadLinkTesting -replace '[^/]+/SkinTattoo.zip', "$tag/SkinTattoo.zip"
          $json | ConvertTo-Json -AsArray | Set-Content -Path $path
      - name: Commit repo.json
        run: |
          git config --global user.name "Actions User"
          git config --global user.email "actions@github.com"
          git fetch origin repo || true
          git branch -f repo ${{ github.sha }}
          git checkout repo
          git add repo.json
          git commit -m "[CI] Update repo.json for ${{ github.ref_name }}" || true
          git push origin repo
